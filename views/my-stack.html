<!-- My Stack — Supplements from Supabase -->
<div class="view-stack">
    <div class="card">
        <h1 class="card-title">💊 My Stack</h1>
        <p class="card-subtitle">Your current supplement stack.</p>
    </div>

    <!-- Summary cards -->
    <div class="metric-grid" id="stackSummary">
        <div class="metric-card"><div class="metric-label">Active</div><div class="metric-value" id="stackActive">0</div></div>
        <div class="metric-card"><div class="metric-label">Categories</div><div class="metric-value" id="stackCategories">0</div></div>
    </div>

    <!-- Category filter -->
    <div class="filter-row" id="stackCategoryFilter"></div>

    <!-- Supplement list -->
    <div id="stackList">
        <div class="empty-state">
            <h3>No supplements yet</h3>
            <p>Tell your Telegram bot about your supplement stack and it'll appear here automatically.</p>
        </div>
    </div>
</div>

<script>
async function init_my_stack() {
    if (!App.supabase) return;

    try {
        const { data: supps, error } = await App.supabase
            .from('supplements')
            .select('*')
            .order('category', { ascending: true });

        if (error || !supps || supps.length === 0) return;

        const active = supps.filter(s => s.active);
        const categories = [...new Set(active.map(s => s.category).filter(Boolean))];

        // Summary
        document.getElementById('stackActive').textContent = active.length;
        document.getElementById('stackCategories').textContent = categories.length;

        // Category filter
        document.getElementById('stackCategoryFilter').innerHTML =
            `<span class="pill active" data-cat="all">All</span>` +
            categories.map(c => `<span class="pill" data-cat="${c}">${c}</span>`).join('');

        function render(filter) {
            const filtered = filter === 'all' ? active : active.filter(s => s.category === filter);
            if (filtered.length === 0) {
                document.getElementById('stackList').innerHTML = `<div class="empty-state" style="padding:40px;"><p>No supplements in this category.</p></div>`;
                return;
            }
            document.getElementById('stackList').innerHTML = filtered.map(s => `
                <div class="card" style="margin-bottom:8px; padding:16px;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <strong>${s.name}</strong>${s.dosage ? ' — ' + s.dosage : ''}
                            ${s.category ? `<span class="pill" style="font-size:11px; margin-left:8px;">${s.category}</span>` : ''}
                        </div>
                    </div>
                    ${s.frequency ? `<div style="font-size:13px; color:var(--text-secondary); margin-top:6px;">${s.frequency}</div>` : ''}
                    ${s.notes ? `<div style="font-size:12px; color:var(--text-muted); margin-top:4px;">${s.notes}</div>` : ''}
                </div>
            `).join('');
        }

        render('all');

        document.querySelectorAll('#stackCategoryFilter .pill').forEach(pill => {
            pill.addEventListener('click', () => {
                document.querySelectorAll('#stackCategoryFilter .pill').forEach(p => p.classList.remove('active'));
                pill.classList.add('active');
                render(pill.dataset.cat);
            });
        });
    } catch (e) {
        console.error('Stack fetch error:', e);
    }
}
</script>
