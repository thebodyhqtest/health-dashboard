<!-- Eyes — History, Routine, Tests -->
<div class="view-eyes">
    <div class="card">
        <h1 class="card-title">👁️ Eyes</h1>
        <p class="card-subtitle">Eye health history, care routine, and test results.</p>
    </div>

    <div class="tab-row" id="eyesTabs">
        <div class="tab active" data-tab="history">History</div>
        <div class="tab" data-tab="routine">Routine</div>
        <div class="tab" data-tab="tests">Tests</div>
    </div>

    <div id="eyesContent">
        <div class="empty-state" style="padding:40px 20px;">
            <h3>No eye exam history yet</h3>
            <p>Send Claude your eye exam history — checkups, prescriptions, tests, surgeries, etc.</p>
        </div>
    </div>
</div>

<script>
async function init_eyes() {
    const tabs = document.querySelectorAll('#eyesTabs .tab');
    const content = document.getElementById('eyesContent');

    const emptyStates = {
        history: { title: 'No eye exam history yet', prompt: 'Send Claude your eye exam history — checkups, prescriptions, tests, surgeries, etc.' },
        routine: { title: 'No eye care routine yet', prompt: 'Send Claude your eye care routine — drops, supplements, blue light habits, contact lens care — to populate this section.' },
        tests: { title: 'No eye test data yet', prompt: 'Send Claude your eye test results — exam reports, OCT scans, visual fields, prescriptions — to populate this section.' }
    };

    const pills = {
        routine: ['Eye Drops', 'Vision Supplements', 'Blue Light Protection', 'Contact Lens Care'],
        tests: ['Eye Exam', 'Glaucoma', 'OCT Scan', 'Visual Fields', 'Prescription']
    };

    async function loadTab(tab) {
        const data = await App.fetchData(`eyes/${tab}`);
        const hasPills = pills[tab];
        let pillHtml = hasPills ? `<div class="filter-row" style="margin-bottom:16px;">${hasPills.map(p => `<span class="pill">${p}</span>`).join('')}</div>` : '';

        if (!data) {
            const es = emptyStates[tab];
            content.innerHTML = pillHtml + `<div class="empty-state" style="padding:40px 20px;"><h3>${es.title}</h3><p>${es.prompt}</p></div>`;
            return;
        }

        if (tab === 'history') {
            if (!data.visits || data.visits.length === 0) {
                content.innerHTML = `<div class="empty-state" style="padding:40px 20px;"><h3>${emptyStates.history.title}</h3><p>${emptyStates.history.prompt}</p></div>`;
                return;
            }
            content.innerHTML = data.visits.map(v => `
                <div class="flag-item" style="margin-bottom:4px; border-left:3px solid ${v.type === 'checkup' ? 'var(--accent)' : 'var(--info)'}; padding-left:16px;">
                    <span style="font-size:12px; color:var(--text-muted); min-width:80px;">${v.date}</span>
                    <div><strong>${v.name}</strong> <span class="pill" style="font-size:11px;">${v.type || ''}</span>
                    ${v.detail ? `<div style="font-size:13px; color:var(--text-secondary); margin-top:4px;">${v.detail}</div>` : ''}</div>
                </div>
            `).join('');
        } else if (tab === 'routine') {
            let html = pillHtml;
            const sections = [
                { key: 'drops', label: '💧 Eye Drops', items: data.drops },
                { key: 'supplements', label: '💊 Vision Supplements', items: data.supplements },
                { key: 'blueLight', label: '🔵 Blue Light Protection', items: data.blueLight },
                { key: 'contacts', label: '👁️ Contact Lens Care', items: data.contacts }
            ];
            let hasAny = false;
            for (const s of sections) {
                if (s.items && s.items.length > 0) {
                    hasAny = true;
                    html += `<div class="card" style="margin-bottom:12px;"><h2 class="card-title" style="font-size:16px; margin-bottom:12px;">${s.label}</h2>`;
                    html += s.items.map(i => `
                        <div class="flag-item" style="margin-bottom:4px;"><span>•</span>
                        <div><strong>${i.name}</strong>${i.brand ? ` — ${i.brand}` : ''}${i.frequency ? ` — ${i.frequency}` : ''}
                        ${i.description ? `<div style="font-size:12px; color:var(--text-muted); margin-top:2px;">${i.description}</div>` : ''}</div></div>
                    `).join('');
                    html += `</div>`;
                }
            }
            if (!hasAny) html += `<div class="empty-state" style="padding:40px 20px;"><h3>${emptyStates.routine.title}</h3><p>${emptyStates.routine.prompt}</p></div>`;
            content.innerHTML = html;
        } else if (tab === 'tests') {
            let html = pillHtml;
            const sections = [
                { key: 'general', label: '👁️ General Eye Checkup', data: data.general },
                { key: 'glaucoma', label: '🔍 Glaucoma Profile', data: data.glaucoma },
                { key: 'oct', label: '📊 OCT Scan', data: data.oct },
                { key: 'visualFields', label: '📐 Visual Fields', data: data.visualFields },
                { key: 'prescription', label: '👓 Prescription History', data: data.prescription }
            ];
            let hasAny = false;
            for (const s of sections) {
                if (s.data) {
                    hasAny = true;
                    html += `<div class="card" style="margin-bottom:12px;"><h2 class="card-title" style="font-size:16px; margin-bottom:12px;">${s.label}</h2>`;
                    if (s.data.results) {
                        html += s.data.results.map(r => `
                            <div class="flag-item" style="margin-bottom:4px;">
                                <span class="flag-dot ${r.status === 'normal' || r.status === 'green' ? 'green' : r.status === 'yellow' ? 'amber' : 'red'}"></span>
                                <span style="flex:1;"><strong>${r.label}</strong> — ${r.value}</span>
                                ${r.note ? `<span style="font-size:12px; color:var(--text-muted);">${r.note}</span>` : ''}
                            </div>
                        `).join('');
                    }
                    html += `</div>`;
                }
            }
            if (!hasAny) html += `<div class="empty-state" style="padding:40px 20px;"><h3>${emptyStates.tests.title}</h3><p>${emptyStates.tests.prompt}</p></div>`;
            content.innerHTML = html;
        }
    }

    tabs.forEach(tab => {
        tab.addEventListener('click', () => {
            tabs.forEach(t => t.classList.remove('active'));
            tab.classList.add('active');
            loadTab(tab.dataset.tab);
        });
    });

    loadTab('history');
}
</script>
