<!-- Log — Daily log from Telegram + activity timeline -->
<div class="view-log">
    <div class="card">
        <h1 class="card-title">📋 Log</h1>
        <p class="card-subtitle">Everything you've logged — Telegram messages, test uploads, supplement changes.</p>
    </div>

    <div class="filter-row" id="logFilters">
        <span class="pill active" data-filter="all">All</span>
        <span class="pill" data-filter="unprocessed">Unprocessed</span>
        <span class="pill" data-filter="processed">Processed</span>
    </div>

    <div id="logContent">
        <div class="empty-state">
            <h3>Your timeline will build as you add data</h3>
            <p>Send messages to your Telegram bot — they'll appear here and get processed into your dashboard automatically.</p>
        </div>
    </div>
</div>

<script>
async function init_log() {
    if (!App.supabase) return;

    let allLogs = [];

    try {
        const { data: logs, error } = await App.supabase
            .from('daily_log')
            .select('*')
            .order('created_at', { ascending: false })
            .limit(100);

        if (error || !logs || logs.length === 0) return;
        allLogs = logs;
    } catch (e) {
        console.error('Log fetch error:', e);
        return;
    }

    const filters = document.querySelectorAll('#logFilters .pill');

    function render(filter) {
        let filtered = allLogs;
        if (filter === 'unprocessed') filtered = allLogs.filter(l => !l.processed);
        if (filter === 'processed') filtered = allLogs.filter(l => l.processed);

        if (filtered.length === 0) {
            document.getElementById('logContent').innerHTML = `<div class="empty-state" style="padding:40px;"><p>No ${filter} entries yet.</p></div>`;
            return;
        }

        document.getElementById('logContent').innerHTML = filtered.map(l => {
            const d = new Date(l.created_at);
            const dateStr = d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
            const statusBadge = l.processed
                ? '<span class="badge badge-normal" style="margin-left:8px;font-size:10px;">PROCESSED</span>'
                : '<span class="badge badge-warning" style="margin-left:8px;font-size:10px;">PENDING</span>';

            return `<div class="flag-item" style="margin-bottom:4px;align-items:flex-start;">
                <span>💬</span>
                <div style="flex:1;">
                    <div>${l.raw_text}${statusBadge}</div>
                </div>
                <span style="font-size:11px; color:var(--text-muted); white-space:nowrap;">${dateStr}</span>
            </div>`;
        }).join('');
    }

    render('all');

    filters.forEach(pill => {
        pill.addEventListener('click', () => {
            filters.forEach(p => p.classList.remove('active'));
            pill.classList.add('active');
            render(pill.dataset.filter);
        });
    });
}
</script>
